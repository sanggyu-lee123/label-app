<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1c1c1e" />
<title>라벨 출력 — 업체별 라벨링</title>
<meta name="description" content="SITE, 주문서번호, 설비명, 팀명, 수령자를 입력하면 라벨 이미지를 생성합니다" />

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    /* ---- token system ---- */
    --ink:        #1c1c1e;
    --paper:      #f6f4ee;
    --paper-2:    #ece8dd;
    --line:       #d8d3c4;
    --line-soft:  #e4e0d2;
    --stamp:      #c5401f;   /* industrial safety-orange stamp accent */
    --stamp-dim:  rgba(197,64,31,0.12);
    --ok:         #2f6e4f;
    --muted:      #8c8775;

    --font-display: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --radius: 4px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html,body{
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-display);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body{
    background-image:
      radial-gradient(circle at 1px 1px, rgba(28,28,30,0.06) 1px, transparent 0);
    background-size: 14px 14px;
    padding-bottom: 48px;
  }

  .shell{ max-width: 560px; margin: 0 auto; padding: 0 18px; }

  /* ---------- HEADER ---------- */
  header{
    padding: 28px 0 18px;
    display:flex;
    align-items:flex-end;
    justify-content: space-between;
    border-bottom: 3px solid var(--ink);
  }
  .brand{
    display:flex; flex-direction:column; gap:2px;
  }
  .brand .eyebrow{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--stamp);
    font-weight: 700;
    text-transform: uppercase;
  }
  .brand h1{
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .stamp-mark{
    width: 46px; height: 46px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    transform: rotate(-8deg);
    flex-shrink:0;
  }
  .stamp-mark span{
    font-family: var(--font-mono);
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-align:center;
    line-height:1.1;
  }

  /* ---------- SECTION LABELS ---------- */
  .section-tag{
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display:flex;
    align-items:center;
    gap: 8px;
    margin: 28px 0 12px;
  }
  .section-tag::after{
    content:'';
    flex:1;
    height:1px;
    background: var(--line);
  }

  /* ---------- FORM ---------- */
  .field-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field{ display:flex; flex-direction:column; gap: 6px; margin-bottom: 10px; }
  .field.full{ grid-column: 1/-1; }

  .field label{
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .field label .opt{
    color: var(--muted);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  .field input{
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: var(--radius);
    padding: 12px 12px;
    font-size: 16px;
    font-family: var(--font-display);
    font-weight: 500;
    color: var(--ink);
    outline: none;
    width: 100%;
  }
  .field input::placeholder{ color: #b6b1a0; font-weight: 400; }
  .field input:focus{
    border-color: var(--stamp);
    box-shadow: 0 0 0 3px var(--stamp-dim);
  }

  /* ---------- TEAM PICKER ---------- */
  .team-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .team-card{
    position:relative;
    border: 1.5px solid var(--ink);
    border-radius: var(--radius);
    padding: 11px 12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap: 9px;
    background: var(--paper);
    transition: transform 0.12s ease;
  }
  .team-card:active{ transform: scale(0.97); }
  .team-card .swatch{
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1.5px solid rgba(0,0,0,0.25);
    flex-shrink:0;
  }
  .team-card .name{
    font-size: 13.5px;
    font-weight: 700;
    line-height:1.2;
  }
  .team-card.active{
    border-width: 2.5px;
    box-shadow: 3px 3px 0 var(--ink);
    transform: translate(-1px,-1px);
  }
  .team-card.active::after{
    content:'✓';
    position:absolute;
    top: 6px; right: 8px;
    font-size: 11px;
    font-weight: 900;
  }

  /* ---------- GENERATE BUTTON ---------- */
  .btn-gen{
    width:100%;
    margin-top: 22px;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    transition: background 0.15s;
  }
  .btn-gen:active{ background: #000; }
  .btn-gen svg{ width:16px; height:16px; }

  /* ---------- PREVIEW (the signature element) ---------- */
  .preview-wrap{ display:none; margin-top: 30px; }

  .ticket{
    position: relative;
    background: var(--ink);
    border-radius: 6px;
    padding: 3px;
    animation: stampIn 0.3s cubic-bezier(.2,.8,.3,1.2);
  }
  @keyframes stampIn{
    from{ opacity:0; transform: scale(0.94) rotate(-1deg); }
    to{ opacity:1; transform: scale(1) rotate(0); }
  }

  .ticket-inner{
    border-radius: 4px;
    overflow:hidden;
    display:grid;
    grid-template-columns: 1fr 2.85fr;
    grid-template-rows: auto auto;
    font-family: var(--font-display);
  }

  .t-cell{
    padding: 20px 18px;
    display:flex;
    align-items:center;
    font-weight: 800;
    line-height: 1.15;
  }
  .t-site{
    font-size: 21px;
    font-family: var(--font-mono);
  }
  .t-equip{ font-size: 27px; }
  .t-order{
    font-size: 18px;
    font-family: var(--font-mono);
  }
  .t-team{ font-size: 24px; }

  .ticket-tab{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 7px 14px 0;
  }
  .ticket-tab .tag{
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(246,244,238,0.55);
    text-transform: uppercase;
  }

  canvas#cvs{ display:none; }

  .action-row{
    display:flex; gap: 10px; margin-top: 14px;
  }
  .btn-action{
    flex:1;
    padding: 13px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border-radius: var(--radius);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 7px;
    border: 1.5px solid var(--ink);
  }
  .btn-copy{ background: var(--ink); color: var(--paper); }
  .btn-copy.success{ background: var(--ok); border-color: var(--ok); }
  .btn-save{ background: var(--paper); color: var(--ink); }

  .status-line{
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted);
    text-align:center;
    margin-top: 10px;
  }
  .status-line.warn{ color: var(--stamp); }

  /* ---------- INSTALL HINT ---------- */
  .install-banner{
    display:none;
    margin-top: 24px;
    border: 1.5px dashed var(--ink);
    border-radius: var(--radius);
    padding: 13px 14px;
    font-size: 12.5px;
    line-height:1.5;
    color: var(--ink);
    background: var(--paper-2);
  }
  .install-banner strong{ font-family: var(--font-mono); letter-spacing:0.5px; }
  .install-banner button{
    margin-top: 8px;
    background: var(--ink);
    color: var(--paper);
    border:none;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight:700;
    letter-spacing: 0.8px;
    cursor:pointer;
  }

  footer{
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-align:center;
    letter-spacing: 0.5px;
  }

  .t-order, .t-site{ white-space: nowrap; }

  @media (max-width: 380px){
    .t-site{ font-size: 16px; }
    .t-equip{ font-size: 19px; }
    .t-order{ font-size: 13px; }
    .t-team{ font-size: 16px; }
    .t-cell{ padding: 14px 8px; }
    .ticket-inner{ grid-template-columns: 0.85fr 2.85fr; }
  }
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="brand">
      <div class="eyebrow">SHIPPING / LABEL UNIT</div>
      <h1>라벨 출력</h1>
    </div>
    <div class="stamp-mark"><span>PACK<br/>&amp;<br/>SHIP</span></div>
  </header>

  <div class="section-tag">01 — 기본 정보</div>
  <div class="field-grid">
    <div class="field">
      <label>SITE</label>
      <input type="text" id="site" placeholder="P3" autocomplete="off" />
    </div>
    <div class="field">
      <label>주문서 번호</label>
      <input type="text" id="order" placeholder="7-14" autocomplete="off" />
    </div>
    <div class="field full">
      <label>설비명</label>
      <input type="text" id="equip" placeholder="ESOB524_EXH 설치" autocomplete="off" />
    </div>
    <div class="field full">
      <label>수령자</label>
      <input type="text" id="receiver" placeholder="박상현" autocomplete="off" />
    </div>
  </div>

  <div class="section-tag">02 — 담당 팀 선택</div>
  <div class="team-grid" id="teamGrid"></div>

  <button class="btn-gen" onclick="generate()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    라벨 생성
  </button>

  <div class="preview-wrap" id="previewWrap">
    <div class="section-tag">03 — 미리보기</div>
    <div class="ticket" id="ticket">
      <div class="ticket-tab"><span class="tag" id="tabTeam">TEAM</span><span class="tag">LBL-01</span></div>
      <div class="ticket-inner" id="ticketInner">
        <div class="t-cell t-site" id="outSite"></div>
        <div class="t-cell t-equip" id="outEquip"></div>
        <div class="t-cell t-order" id="outOrder"></div>
        <div class="t-cell t-team" id="outTeam"></div>
      </div>
    </div>

    <canvas id="cvs"></canvas>

    <div class="action-row">
      <button class="btn-action btn-copy" id="copyBtn" onclick="copyImg()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        복사
      </button>
      <button class="btn-action btn-save" onclick="downloadImg()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        저장
      </button>
    </div>
    <div class="status-line" id="statusLine">클립보드 복사 후 카카오톡에 바로 붙여넣기 하세요</div>
  </div>

  <div class="install-banner" id="installBanner">
    <strong>TIP —</strong> 이 화면을 홈 화면에 추가하면 앱처럼 바로 쓸 수 있어요.
    <div>iOS: 공유 버튼 → "홈 화면에 추가"<br/>Android: 메뉴 → "홈 화면에 추가/앱 설치"</div>
    <button onclick="tryInstall()" id="installBtn" style="display:none">지금 설치하기</button>
  </div>

  <footer>OFFLINE-READY · NO DATA STORED</footer>
</div>

<script>
/* ---------------- TEAM DATA ---------------- */
const teams = [
  { name: '최형재팀', color: [48, 48, 150] },
  { name: '연호',     color: [220, 100, 100] },
  { name: '엘테크',   color: [128, 128, 128] },
  { name: '하나기술', color: [240, 240, 240] },
  { name: '유성완팀', color: [128, 96, 0] },
  { name: '이진원팀', color: [31, 78, 120] },
  { name: '박인기팀', color: [55, 86, 35] },
];

let selectedTeam = null;

function lum(c){ return 0.2126*c[0] + 0.7152*c[1] + 0.0722*c[2]; }
function rgbStr(c){ return `rgb(${c[0]},${c[1]},${c[2]})`; }

const teamGrid = document.getElementById('teamGrid');
teams.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'team-card';
  card.innerHTML = `<span class="swatch" style="background:${rgbStr(t.color)}"></span><span class="name">${t.name}</span>`;
  card.onclick = () => {
    document.querySelectorAll('.team-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    selectedTeam = t;
  };
  teamGrid.appendChild(card);
});

/* ---------------- GENERATE ---------------- */
function generate(){
  const site     = document.getElementById('site').value.trim();
  const order    = document.getElementById('order').value.trim();
  const equip    = document.getElementById('equip').value.trim();
  const receiver = document.getElementById('receiver').value.trim();

  if(!site || !selectedTeam){
    alert('SITE와 담당 팀은 필수입니다.');
    return;
  }

  const c = selectedTeam.color;
  const l = lum(c);
  const textColor   = l > 100 ? '#1c1c1e' : '#f6f4ee';
  const borderColor = l > 100 ? 'rgba(28,28,30,0.25)' : 'rgba(246,244,238,0.35)';

  const inner = document.getElementById('ticketInner');
  inner.style.background = rgbStr(c);

  ['outSite','outEquip','outOrder','outTeam'].forEach(id=>{
    document.getElementById(id).style.color = textColor;
  });
  document.getElementById('outSite').style.borderRight  = `2px solid ${borderColor}`;
  document.getElementById('outSite').style.borderBottom = `2px solid ${borderColor}`;
  document.getElementById('outEquip').style.borderBottom = `2px solid ${borderColor}`;
  document.getElementById('outOrder').style.borderRight  = `2px solid ${borderColor}`;

  document.getElementById('outSite').textContent  = site;
  document.getElementById('outEquip').textContent = equip || '-';
  document.getElementById('outOrder').textContent = order ? `(${order})` : '-';
  document.getElementById('outTeam').textContent  = `${selectedTeam.name}  ${receiver}`;
  document.getElementById('tabTeam').textContent  = selectedTeam.name.toUpperCase();

  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('previewWrap').scrollIntoView({behavior:'smooth', block:'start'});

  renderCanvas(site, order, equip, receiver, c, l);

  // restart pop animation
  const ticket = document.getElementById('ticket');
  ticket.style.animation = 'none';
  requestAnimationFrame(()=>{ ticket.style.animation = ''; });

  const statusEl = document.getElementById('statusLine');
  if (!navigator.clipboard || !window.ClipboardItem){
    document.getElementById('copyBtn').style.display = 'none';
    statusEl.textContent = '이 브라우저는 클립보드 복사를 지원하지 않아요. 저장 후 전송하세요.';
    statusEl.className = 'status-line warn';
  } else {
    document.getElementById('copyBtn').style.display = 'flex';
    statusEl.textContent = '클립보드 복사 후 카카오톡에 바로 붙여넣기 하세요';
    statusEl.className = 'status-line';
  }
}

function renderCanvas(site, order, equip, receiver, c, l){
  const cvs = document.getElementById('cvs');
  const W = 900, H = 320;
  const col1 = Math.round(W / 3.8);
  const col2 = W - col1;
  const rowH = H / 2;
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');

  ctx.fillStyle = rgbStr(c);
  roundRect(ctx, 0, 0, W, H, 10); ctx.fill();

  const textColor = l > 100 ? '#1c1c1e' : '#f6f4ee';
  const lineColor = l > 100 ? 'rgba(28,28,30,0.25)' : 'rgba(246,244,238,0.35)';

  ctx.strokeStyle = l > 100 ? '#1c1c1e' : 'rgba(246,244,238,0.7)';
  ctx.lineWidth = 4;
  roundRect(ctx, 2, 2, W-4, H-4, 9); ctx.stroke();

  ctx.strokeStyle = lineColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(8, rowH); ctx.lineTo(W-8, rowH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(col1, 8); ctx.lineTo(col1, H-8); ctx.stroke();

  ctx.fillStyle = textColor; ctx.textBaseline = 'middle';

  ctx.font = `700 36px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(site, col1/2, rowH/2);

  ctx.font = `800 44px 'Noto Sans KR', sans-serif`;
  ctx.fillText(equip || '-', col1 + col2/2, rowH/2);

  ctx.font = `700 30px 'JetBrains Mono', monospace`;
  ctx.fillText(order ? `(${order})` : '-', col1/2, rowH + rowH/2);

  ctx.font = `800 40px 'Noto Sans KR', sans-serif`;
  ctx.fillText(`${selectedTeam.name}  ${receiver}`, col1 + col2/2, rowH + rowH/2);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

async function copyImg(){
  const cvs = document.getElementById('cvs');
  const btn = document.getElementById('copyBtn');
  const statusEl = document.getElementById('statusLine');
  try{
    const blob = await new Promise(res => cvs.toBlob(res, 'image/png'));
    await navigator.clipboard.write([ new ClipboardItem({'image/png': blob}) ]);
    btn.classList.add('success');
    btn.innerHTML = '✓ 복사됨';
    statusEl.textContent = '카카오톡 채팅창에서 붙여넣기 하세요!';
    setTimeout(()=>{
      btn.classList.remove('success');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사';
    }, 2500);
  }catch(e){
    statusEl.textContent = '복사 실패 — 브라우저 권한을 확인하거나 저장을 이용하세요';
    statusEl.className = 'status-line warn';
  }
}

function downloadImg(){
  const cvs = document.getElementById('cvs');
  const link = document.createElement('a');
  const site = document.getElementById('site').value.trim() || 'label';
  link.download = `라벨_${site}_${selectedTeam.name}.png`;
  link.href = cvs.toDataURL('image/png');
  link.click();
}

/* ---------------- PWA INSTALL ---------------- */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
  document.getElementById('installBtn').style.display = 'inline-block';
});

function tryInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
}

// Show banner anyway after a short delay (for iOS / browsers without the event)
setTimeout(()=>{
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(!isStandalone){
    document.getElementById('installBanner').style.display = 'block';
  }
}, 1200);

/* ---------------- SERVICE WORKER ---------------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // Check for updates every time the app loads, and activate immediately
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(()=>{});

    // Reload once when a new service worker takes control
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
